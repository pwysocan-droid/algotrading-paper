name: fetch-and-commit

# Scheduled cron DISABLED 2026-05-23 in favor of the Hetzner VPS cron
# (see decision-log entry 2026-05-23 and vps/README.md). GitHub's
# free-tier */5 schedule delivered ~4% of expected invocations, which
# made the 95% uptime gate unachievable. The VPS runs the same pipeline
# via vps/cron-fetch.sh under system cron.
#
# This workflow is preserved for manual trigger (workflow_dispatch) — a
# one-off fetch, or a temporary fallback during VPS downtime. To
# re-enable scheduled runs, uncomment the schedule block below (but per
# the decision-log entry, this platform can't clear the uptime gate).

on:
  # schedule:
  #   - cron: '*/5 * * * *'   # disabled 2026-05-23 — see above
  workflow_dispatch:  # manual trigger for testing / on-demand fetches

permissions:
  contents: write  # required for git push back to the same repo

concurrency:
  group: fetch-and-commit
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # one less than the 5-min interval prevents overlap
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch bars
        id: fetch
        continue-on-error: true  # failures still produce a runs row we want to commit
        run: |
          # 90-minute lookback (1.5x the observed ~60-min GH cron cadence)
          # closes the bar-coverage gap that --minutes=15 left when the
          # documented */5 cadence is throttled to ~hourly. fetch.py
          # upserts on (symbol, timestamp) so overlap is free; the extra
          # bars per call are ~18 per symbol instead of ~3. See decision-
          # log 2026-05-18 for the recalibration rationale.
          python fetch.py --minutes=90

      - name: Regenerate INDEX.md
        # Always run, even on fetch failure — INDEX reflects current DB
        # state including the failure row, which is what we want operators
        # to see.
        run: python render_index.py

      - name: Regenerate surface/surface.json
        # Writes the JSON feed consumed by the live PWA at /surface/.
        # Same always-run discipline as INDEX — failures still produce
        # a fresh snapshot so the surface reflects current uptime.
        run: python scripts/generate_surface.py

      - name: Commit and push
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "algotrading-paper bot"
          git add trader.db INDEX.md surface/surface.json
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MSG="fetch run ${NOW}"
          if [ "${{ steps.fetch.outcome }}" != "success" ]; then
            MSG="${MSG} (fetch failed; runs row logged)"
          fi
          git commit -m "${MSG}"

          # Retry on push conflict (operator pushed during cron run).
          # The runs row is already committed locally; if push fails
          # permanently, the next cron run will catch up.
          for attempt in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "push failed on attempt ${attempt}; pulling rebased and retrying"
            git pull --rebase --autostash || {
              echo "rebase failed; data is safe in next run"
              exit 0
            }
          done
          echo "push failed after 3 retries; runs data is safe — next cron run will pick up"
          exit 0
