name: Deploy Pages

# Replaces the legacy "deploy from branch" Pages build, which failed
# ~1-in-3 runs with "Deployment failed, try again later" — a concurrency
# collision from the VPS cron pushing to main every 5 minutes, each push
# racing an overlapping deployment.
#
# concurrency.cancel-in-progress (below) turned out to be necessary but
# not sufficient: GitHub's Pages deployment *backend* still rejects a new
# deployment if the previous one hasn't settled, independent of Actions-
# level concurrency. Empirically, 5 minutes apart isn't enough breathing
# room; still failed ~30-45% of runs with cancel-in-progress alone.
#
# Fix: debounce in the first step. Skip the deploy (clean success, not a
# failure) if the last successful deploy was under DEBOUNCE_MINUTES ago.
# Deliberately NOT using `on: schedule` to get a slower cadence — GitHub
# Actions schedules on this repo are already documented (decision-log.md
# 2026-05-18) as unreliable at anything near 5-15 min ("5-min schedules
# on public repos with bot-only commits operate at 3-5%"). Same lesson
# applied here: stay on the reliable push trigger, throttle ourselves.
#
# Artifact is the whole repo root, matching the legacy build's behavior
# exactly — existing links (e.g. .../algotrading-paper/surface/) keep
# working unchanged.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  DEBOUNCE_MINUTES: 10

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Debounce against live site freshness
        id: debounce
        # Measures what we actually care about — how stale the deployed
        # site is — instead of workflow-run history. The previous
        # implementation checked the last *successful run*, but skipped
        # runs also conclude success, so after one deploy every later
        # run saw a fresh "success" and skipped: the site froze
        # (discovered 2026-07-16 serving 3-day-old data). Site age is
        # self-correcting: fresh → skip; stale or unreachable → deploy.
        run: |
          GENERATED_AT=$(curl -sf --max-time 15 \
            "https://pwysocan-droid.github.io/algotrading-paper/surface/surface.json?t=$(date +%s)" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['generated_at'])" \
            2>/dev/null || echo "")

          if [ -z "$GENERATED_AT" ]; then
            echo "live site unreachable or unparsable — deploying"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SITE_EPOCH=$(date -d "$GENERATED_AT" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date -u +%s)
          MINUTES_STALE=$(( (NOW_EPOCH - SITE_EPOCH) / 60 ))
          echo "live surface.json is ${MINUTES_STALE}min old (${GENERATED_AT})"

          if [ "$MINUTES_STALE" -lt "$DEBOUNCE_MINUTES" ]; then
            echo "site fresh (< ${DEBOUNCE_MINUTES}min) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.debounce.outputs.skip != 'true'
      - uses: actions/configure-pages@v5
        if: steps.debounce.outputs.skip != 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.debounce.outputs.skip != 'true'
        with:
          path: "."
      - id: deployment
        if: steps.debounce.outputs.skip != 'true'
        uses: actions/deploy-pages@v4
